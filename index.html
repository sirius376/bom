  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --pink: #FF6B6B;
      --pink-light: #FFE8E8;
      --pink-dark: #D94F4F;
      --text: #1A1A1A;
      --text-sub: #666;
      --bg: #FFFAF9;
      --white: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* 상단 헤더 */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--pink);
      letter-spacing: -0.3px;
    }

    #header .logo span {
      color: var(--text);
    }

    #header .count-badge {
      font-size: 12px;
      background: var(--pink-light);
      color: var(--pink-dark);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* 지도 */
    #map {
      position: fixed;
      top: 52px;
      bottom: 60px;
      left: 0; right: 0;
      z-index: 1;
    }

    /* 필터 바 */
    #filter-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #filter-bar::-webkit-scrollbar { display: none; }

    .f-btn {
      flex-shrink: 0;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #F7F7F7;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .f-btn.active {
      background: var(--pink);
      color: white;
      border-color: var(--pink);
    }

    /* 범례 */
    #legend {
      position: absolute;
      top: 62px;
      left: 10px;
      z-index: 500;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--text); line-height: 1; }
    .leg-row:last-child { margin-bottom: 0; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* 팝업 커스텀 */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }

    .pop-wrap { padding: 14px 16px; min-width: 190px; }
    .pop-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 10px;
      margin-bottom: 7px;
    }
    .pop-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
    .pop-row { font-size: 12px; color: var(--text-sub); line-height: 1.8; }
    .pop-row b { color: var(--text); font-weight: 500; }

    /* 현재 필터 표시 */
    #cur-label {
      position: absolute;
      top: 62px;
      right: 10px;
      z-index: 500;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px 11px;
      font-size: 11px;
      color: var(--text-sub);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    #cur-label b { color: var(--pink); font-weight: 700; }
  </style>
</head>

    return L.divIcon({ html: svg, className: '', iconSize:[30,38], iconAnchor:[15,38], popupAnchor:[0,-38] });
  }

  const map = L.map('map', { center:[36.2,127.9], zoom:7, zoomControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:18
  }).addTo(map);
  L.control.zoom({ position:'bottomright' }).addTo(map);

  let markers = [];

  function render(filter) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    const data = filter === "전체" ? festivals : festivals.filter(f => f.cat === filter);
    document.getElementById('cnt-badge').textContent = `전국 ${data.length}개 축제`;
    document.getElementById('cur-cat').textContent = filter;
    document.getElementById('cur-cnt').textContent = data.length;
    data.forEach(f => {
      const c = catColor[f.cat] || "#888780";
      const e = catEmoji[f.cat] || "🎪";
      const popup = `<div class="pop-wrap">
        <div class="pop-badge" style="background:${c}18;color:${c};border:1px solid ${c}44">${e} ${f.cat}</div>
        <div class="pop-name">${f.name}</div>
        <div class="pop-row">📅 <b>${f.period}</b></div>
        <div class="pop-row">📍 ${f.place}</div>
        <div class="pop-row" style="margin-top:2px;font-size:11px;color:#aaa">${f.region}</div>
      </div>`;
      const m = L.marker([f.lat, f.lng], {icon: makeIcon(f.cat)})
        .bindPopup(popup, {maxWidth:240, closeButton:false})
        .addTo(map);
      markers.push(m);
    });
  }

  render("전체");

  document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.f-btn');
    if (!btn) return;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.cat);
  });
  </script>
</body>
</html>
