  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --pink: #FF6B6B;
      --pink-light: #FFE8E8;
      --pink-dark: #D94F4F;
      --green: #2ECC71;
      --green-light: #E8FBF0;
      --green-dark: #1A9E52;
      --text: #1A1A1A;
      --text-sub: #666;
      --bg: #FFFAF9;
      --white: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
    }

    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #header .logo { font-size: 17px; font-weight: 700; color: var(--pink); letter-spacing: -0.3px; }
    #header .logo span { color: var(--text); }
    #header .right-wrap { display: flex; align-items: center; gap: 8px; }
    #header .today-badge {
      font-size: 11px; font-weight: 600;
      background: var(--green-light); color: var(--green-dark);
      padding: 4px 9px; border-radius: 20px;
      border: 1px solid #b7f0d0;
      display: none;
    }
    #header .count-badge {
      font-size: 12px; background: var(--pink-light); color: var(--pink-dark);
      padding: 4px 10px; border-radius: 20px; font-weight: 500;
    }

    #map { position: fixed; top: 52px; bottom: 60px; left: 0; right: 0; z-index: 1; }

    #filter-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none;
    }
    #filter-bar::-webkit-scrollbar { display: none; }
    .f-btn {
      flex-shrink: 0; font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; font-weight: 500; padding: 6px 13px;
      border-radius: 20px; border: 1.5px solid var(--border);
      background: #F7F7F7; color: var(--text-sub); cursor: pointer;
      transition: all 0.18s; white-space: nowrap;
    }
    .f-btn:not([style]):hover { background: #EFEFEF; }
    .f-btn[style]:not(.active) { border-color: var(--c); color: var(--c); background: white; }
    .f-btn.active { background: var(--c, var(--pink)); color: white; border-color: var(--c, var(--pink)); }
    .f-btn:not([style]).active { background: var(--pink); color: white; border-color: var(--pink); }

    #legend {
      position: absolute; top: 62px; left: 10px; z-index: 500;
      background: white; border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 12px; font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--text); line-height: 1; }
    .leg-row:last-child { margin-bottom: 0; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* 진행중 배지 */
    #ongoing-bar {
      position: absolute; top: 62px; right: 10px; z-index: 500;
      background: white; border: 1px solid #b7f0d0; border-radius: 10px;
      padding: 5px 11px; font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: none; cursor: pointer;
      user-select: none;
    }
    #ongoing-bar b { color: var(--green-dark); font-weight: 700; }

    /* 팝업 */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      padding: 0 !important; overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      top: 8px !important; right: 10px !important;
      font-size: 16px !important; color: #aaa !important;
    }

    .pop-wrap { padding: 14px 16px; min-width: 190px; }
    .pop-header { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
    .pop-badge {
      display: inline-block; font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 10px;
    }
    .pop-ongoing {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
      background: var(--green-light); color: var(--green-dark);
      border: 1px solid #b7f0d0;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }
    .marker-dot-ongoing {
      animation: dotPulse 2s ease-in-out infinite;
    }
    .pop-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
    .pop-row { font-size: 12px; color: var(--text-sub); line-height: 1.8; }
    .pop-row b { color: var(--text); font-weight: 500; }
  </style>
</head>

    {name:"서귀포유채꽃축제",region:"제주 서귀포",period:"4.4 ~ 4.5",place:"조랑말체험공원 일대",cat:"유채꽃",lat:33.3688,lng:126.7972,start:"2026-04-04",end:"2026-04-05"},
    {name:"전농로 왕벚꽃 축제",region:"제주 제주",period:"3.27 ~ 3.29",place:"전농로 일대",cat:"벚꽃",lat:33.5106,lng:126.5431,start:"2026-03-27",end:"2026-03-29"},
    {name:"금산 보곡산골 산벚꽃 축제",region:"충남 금산",period:"4.11 ~ 4.19",place:"산꽃벚꽃마을 오토캠핑장",cat:"벚꽃",lat:36.1083,lng:127.4887,start:"2026-04-11",end:"2026-04-19"},
    {name:"논산딸기축제",region:"충남 논산",period:"3.26 ~ 3.29",place:"논산시민가족공원 일원",cat:"기타",lat:36.1880,lng:127.0985,start:"2026-03-26",end:"2026-03-29"},
    {name:"서산 유기방가옥 수선화축제",region:"충남 서산",period:"3.27 ~ 4.19",place:"서산유기방가옥",cat:"수선화",lat:36.6927,lng:126.4977,start:"2026-03-27",end:"2026-04-19"},
    {name:"천리포수목원 목련축제",region:"충남 태안",period:"3.27 ~ 4.19",place:"천리포수목원",cat:"기타",lat:36.8116,lng:126.3002,start:"2026-03-27",end:"2026-04-19"},
    {name:"태안세계튤립꽃박람회",region:"충남 태안",period:"4.1 ~ 5.6",place:"네이처월드",cat:"튤립",lat:36.7451,lng:126.2973,start:"2026-04-01",end:"2026-05-06"},
    {name:"청풍호 벚꽃축제",region:"충북 제천",period:"4.4 ~ 4.19",place:"청풍호 일대",cat:"벚꽃",lat:36.9927,lng:128.1673,start:"2026-04-04",end:"2026-04-19"},
  ];

  const catColor = {
    "벚꽃":"#D85A30","진달래":"#639922","유채꽃":"#EF9F27",
    "산수유":"#1D9E75","매화":"#1D9E75","장미":"#D4537E",
    "튤립":"#7F77DD","수선화":"#7F77DD","철쭉":"#888780","기타":"#888780"
  };
  const catEmoji = {
    "벚꽃":"🌸","진달래":"🌺","유채꽃":"🌼","산수유":"🌿","매화":"🌸",
    "장미":"🌹","튤립":"🌷","수선화":"💐","철쭉":"🌸","기타":"🎪"
  };

  const today = new Date();
  today.setHours(0,0,0,0);

  function isOngoing(f) {
    const s = new Date(f.start); s.setHours(0,0,0,0);
    const e = new Date(f.end); e.setHours(23,59,59,999);
    return today >= s && today <= e;
  }

  // 꽃 모양 마커 (모바일 최적화 사이즈)
  const pastel = {
    "벚꽃":   {main:"#F07070", sh:"#B84040"},
    "진달래": {main:"#72B84E", sh:"#3D7A28"},
    "유채꽃": {main:"#F0AA30", sh:"#B87010"},
    "산수유": {main:"#38B07A", sh:"#1A7A50"},
    "매화":   {main:"#A870C8", sh:"#7040A0"},
    "장미":   {main:"#E8609A", sh:"#B03070"},
    "튤립":   {main:"#6888E8", sh:"#3848B8"},
    "수선화": {main:"#40A8D0", sh:"#1878A0"},
    "철쭉":   {main:"#A870B8", sh:"#784090"},
    "기타":   {main:"#909088", sh:"#585850"},
  };

  function makeIcon(cat, ongoing) {
    const p = pastel[cat] || pastel["기타"];
    const size = ongoing ? 44 : 34;
    const cx = size / 2;
    const r = cx - 3;
    const dotFill = ongoing ? "#2ECC71" : "white";
    const dotR = ongoing ? Math.round(r * 0.38) : Math.round(r * 0.35);
    const dotClass = ongoing ? 'class="marker-dot-ongoing"' : '';
    const fid = `sh${cat.charCodeAt(0)}${ongoing?1:0}`;

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <defs>
        <filter id="${fid}" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,0.32)"/>
        </filter>
      </defs>
      <g filter="url(#${fid})">
        <circle cx="${cx}" cy="${cx}" r="${r}" fill="${p.main}"/>
        <circle cx="${cx}" cy="${cx}" r="${r - 2.5}" fill="${p.main}" opacity="0.15"/>
        <circle cx="${cx}" cy="${cx}" r="${dotR + 2}" fill="white" opacity="0.9"/>
        <circle cx="${cx}" cy="${cx}" r="${dotR}" fill="${dotFill}" opacity="0.95" ${dotClass}/>
      </g>
    </svg>`;

    return L.divIcon({
      html: svg, className: '',
      iconSize: [size, size],
      iconAnchor: [cx, cx],
      popupAnchor: [0, -(cx + 6)]
    });
  }

  const map = L.map('map', { center:[36.2,127.9], zoom:7, zoomControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:18
  }).addTo(map);
  L.control.zoom({ position:'bottomright' }).addTo(map);

  let markers = [];
  let ongoingMarkers = [];

  function render(filter) {
    markers.forEach(m => map.removeLayer(m));
    markers = []; ongoingMarkers = [];

    const data = filter === "전체" ? festivals : festivals.filter(f => f.cat === filter);
    const ongoingList = data.filter(f => isOngoing(f));

    document.getElementById('cnt-badge').textContent = `전국 ${data.length}개 축제`;

    // 진행중 배지
    if (ongoingList.length > 0) {
      document.getElementById('ongoing-bar').style.display = 'block';
      document.getElementById('ongoing-cnt').textContent = ongoingList.length;
      document.getElementById('today-badge').style.display = 'inline-block';
    } else {
      document.getElementById('ongoing-bar').style.display = 'none';
      document.getElementById('today-badge').style.display = 'none';
    }

    function closeAll() { markers.forEach(m => m.closePopup()); }

    // 일반 마커
    data.filter(f => !isOngoing(f)).forEach(f => {
      const c = catColor[f.cat] || "#888780";
      const e = catEmoji[f.cat] || "🎪";
      const popup = `<div class="pop-wrap">
        <div class="pop-header">
          <span class="pop-badge" style="background:${c}18;color:${c};border:1px solid ${c}44">${e} ${f.cat}</span>
        </div>
        <div class="pop-name">${f.name}</div>
        <div class="pop-row">📅 <b>${f.period}</b></div>
        <div class="pop-row">📍 ${f.place}</div>
        <div class="pop-row" style="margin-top:2px;font-size:11px;color:#aaa">${f.region}</div>
      </div>`;
      const m = L.marker([f.lat, f.lng], {icon: makeIcon(f.cat, false)})
        .bindPopup(popup, {maxWidth:240, closeButton:true})
        .addTo(map);
      m.on('click', () => { closeAll(); setTimeout(() => m.openPopup(), 10); });
      markers.push(m);
    });

    // 진행중 마커
    ongoingList.forEach((f, idx) => {
      const c = catColor[f.cat] || "#888780";
      const e = catEmoji[f.cat] || "🎪";
      const popup = `<div class="pop-wrap">
        <div class="pop-header">
          <span class="pop-badge" style="background:${c}18;color:${c};border:1px solid ${c}44">${e} ${f.cat}</span>
          <span class="pop-ongoing">🟢 진행중</span>
        </div>
        <div class="pop-name">${f.name}</div>
        <div class="pop-row">📅 <b>${f.period}</b></div>
        <div class="pop-row">📍 ${f.place}</div>
        <div class="pop-row" style="margin-top:2px;font-size:11px;color:#aaa">${f.region}</div>
      </div>`;
      const m = L.marker([f.lat, f.lng], {icon: makeIcon(f.cat, true), zIndexOffset: 1000})
        .bindPopup(popup, {maxWidth:240, closeButton:true, autoClose:false, closeOnClick:false})
        .addTo(map);
      m.on('click', () => { closeAll(); setTimeout(() => m.openPopup(), 10); });
      if (idx === 0) setTimeout(() => m.openPopup(), 600);
      markers.push(m);
      ongoingMarkers.push(m);
    });
  }

  // 진행중 배지 클릭 → 지도 전국 뷰로 축소
  document.getElementById('ongoing-bar').addEventListener('click', () => {
    if (ongoingMarkers.length === 0) return;
    map.closePopup();
    map.flyTo([36.2, 127.9], 7, { duration: 1.0 });
  });

  render("전체");

  document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.f-btn');
    if (!btn) return;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.cat);
  });
  </script>
</body>
</html>
