  <script>
  // ─── 티커: 축제 D-day 자동 계산 (페이지 로드 후 실행) ────────
  function renderTicker() {
    const now = new Date(); now.setHours(0,0,0,0);
    const items = festivals.map(f => {
      const s = new Date(f.start); s.setHours(0,0,0,0);
      const e = new Date(f.end);   e.setHours(0,0,0,0);
      const diffStart = Math.round((s - now) / 86400000);
      const diffEnd   = Math.round((e - now) / 86400000);
      let label, cls, arrow;
      if (now >= s && now <= e) {
        label = diffEnd === 0 ? '오늘 마지막' : `진행중 · ${diffEnd}일 남음`;
        cls = 'high'; arrow = '●';
        return {name: f.name, label, cls, arrow, days: diffEnd, lat: f.lat, lng: f.lng};
      } else if (diffStart > 0) {
        label = `D-${diffStart}`;
        cls = diffStart <= 7 ? 'mid' : 'low';
        arrow = '▷';
        return {name: f.name, label, cls, arrow, days: diffStart, lat: f.lat, lng: f.lng};
      } else {
        return null;
      }
    }).filter(Boolean);

    items.sort((a, b) => {
      if (a.cls !== b.cls) {
        return {'high':0,'mid':1,'low':2}[a.cls] - {'high':0,'mid':1,'low':2}[b.cls];
      }
      return a.days - b.days;
    });

    const inner = document.getElementById('ticker-inner');
    // 3벌 복제로 seamless 루프 보장, lat/lng/ongoing 데이터 심기
    inner.innerHTML = [...items, ...items, ...items].map(b =>
      `<div class="ticker-item" data-lat="${b.lat}" data-lng="${b.lng}" data-ongoing="${b.cls === 'high'}" style="cursor:pointer">
        <span class="t-name">${b.name}</span>
        <span class="t-pct ${b.cls}"><span class="ticker-arrow">${b.arrow}</span>${b.label}</span>
      </div>`
    ).join('');

    // 티커 아이템 클릭 → 해당 위치로 이동 후 팝업 열기
    inner.querySelectorAll('.ticker-item').forEach(el => {
      el.addEventListener('click', () => {
        const lat = parseFloat(el.dataset.lat);
        const lng = parseFloat(el.dataset.lng);
        const isOngoingItem = el.dataset.ongoing === 'true';
        map.flyTo([lat, lng], 13, { duration: 0.8 });
        setTimeout(() => {
          const mk = markers.find(m => {
            const ll = m.getLatLng();
            return Math.abs(ll.lat - lat) < 0.0001 && Math.abs(ll.lng - lng) < 0.0001;
          });
          if (mk) { closeAll(); mk.openPopup(); }
        }, 900);
      });
    });

    // CSS animation 완전 제거, JS RAF로 대체
    inner.style.animation = 'none';
    const speed = 0.7;
    let pos = 0;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const oneSetW = inner.scrollWidth / 3;
      function tick() {
        pos += speed;
        if (pos >= oneSetW) pos -= oneSetW;
        inner.style.transform = `translateX(${-pos}px)`;
        requestAnimationFrame(tick);
      }
      tick();
    }));
  }

  const festivals = [
    {name:"경포벚꽃축제",region:"강원 강릉",period:"4.4 ~ 4.11",place:"경포호수 일원",cat:"벚꽃",lat:37.7928,lng:128.9010,start:"2026-04-04",end:"2026-04-11"},

    {name:"단종문화제",region:"강원 영월",period:"4.24 ~ 4.26",place:"장릉 및 영월 일대",cat:"기타",lat:37.1883,lng:128.4614,start:"2026-04-24",end:"2026-04-26"},

  const catColor = {
    "벚꽃":"#D85A30","진달래":"#639922","유채꽃":"#EF9F27",
    "산수유":"#1D9E75","매화":"#1D9E75","장미":"#D4537E",
    "튤립":"#7F77DD","수선화":"#7F77DD","철쭉":"#888780","기타":"#888780"
  };
  const catEmoji = {
    "벚꽃":"🌸","진달래":"🌺","유채꽃":"🌼","산수유":"🌿","매화":"🌸",
    "장미":"🌹","튤립":"🌷","수선화":"💐","철쭉":"🌸","기타":"🎪"
  };

  const today = new Date();
  today.setHours(0,0,0,0);

  function isOngoing(f) {
    const s = new Date(f.start); s.setHours(0,0,0,0);
    const e = new Date(f.end); e.setHours(23,59,59,999);
    return today >= s && today <= e;
  }

  // 꽃 모양 마커 (모바일 최적화 사이즈)
  const pastel = {
    "벚꽃":   {main:"#F07070", sh:"#B84040"},
    "진달래": {main:"#72B84E", sh:"#3D7A28"},
    "유채꽃": {main:"#F0AA30", sh:"#B87010"},
    "산수유": {main:"#38B07A", sh:"#1A7A50"},
    "매화":   {main:"#A870C8", sh:"#7040A0"},
    "장미":   {main:"#E8609A", sh:"#B03070"},
    "튤립":   {main:"#6888E8", sh:"#3848B8"},
    "수선화": {main:"#40A8D0", sh:"#1878A0"},
    "철쭉":   {main:"#A870B8", sh:"#784090"},
    "기타":   {main:"#909088", sh:"#585850"},
  };

  function makeIcon(cat, ongoing) {
    const p = pastel[cat] || pastel["기타"];
    const size = ongoing ? 44 : 34;
    const cx = size / 2;
    const r = cx - 3;
    const dotFill = ongoing ? "#2ECC71" : "white";
    const dotR = ongoing ? Math.round(r * 0.38) : Math.round(r * 0.35);
    const dotClass = ongoing ? 'class="marker-dot-ongoing"' : '';
    const fid = `sh${cat.charCodeAt(0)}${ongoing?1:0}`;

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <defs>
        <filter id="${fid}" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,0.32)"/>
        </filter>
      </defs>
      <g filter="url(#${fid})">
        <circle cx="${cx}" cy="${cx}" r="${r}" fill="${p.main}"/>
        <circle cx="${cx}" cy="${cx}" r="${r - 2.5}" fill="${p.main}" opacity="0.15"/>
        <circle cx="${cx}" cy="${cx}" r="${dotR + 2}" fill="white" opacity="0.9"/>
        <circle cx="${cx}" cy="${cx}" r="${dotR}" fill="${dotFill}" opacity="0.95" ${dotClass}/>
      </g>
    </svg>`;

    return L.divIcon({
      html: svg, className: '',
      iconSize: [size, size],
      iconAnchor: [cx, cx],
      popupAnchor: [0, -(cx + 6)]
    });
  }

  const map = L.map('map', { center:[36.2,127.9], zoom:7, zoomControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:18
  }).addTo(map);
  L.control.zoom({ position:'bottomright' }).addTo(map);

  let markers = [];
  let ongoingMarkers = [];

  function closeAll() { markers.forEach(m => m.closePopup()); }

  function makePopup(f, ongoing) {
    const c = catColor[f.cat] || "#888780";
    const e = catEmoji[f.cat] || "🎪";
    const kakaoUrl = `https://map.kakao.com/link/to/${encodeURIComponent(f.name)},${f.lat},${f.lng}`;
    const ongoingBadge = ongoing ? `<span class="pop-ongoing">🟢 진행중</span>` : '';
    return `<div class="pop-wrap">
      <div class="pop-header">
        <span class="pop-badge" style="background:${c}18;color:${c};border:1px solid ${c}44">${e} ${f.cat}</span>
        ${ongoingBadge}
      </div>
      <div class="pop-name">${f.name}</div>
      <div class="pop-row">📅 <b>${f.period}</b></div>
      <div class="pop-row">📍 ${f.place}</div>
      <div class="pop-row" style="margin-top:2px;font-size:11px;color:#aaa">${f.region}</div>
      <a class="pop-kakao" href="${kakaoUrl}" target="_blank">🗺 카카오맵으로 길찾기</a>
    </div>`;
  }

  function renderCards(data) {
    const scroll = document.getElementById('list-scroll');
    document.getElementById('list-cnt').textContent = `${data.length}개`;
    const now = new Date(); now.setHours(0,0,0,0);
    const sorted = [...data].sort((a,b) => {
      const ao = isOngoing(a), bo = isOngoing(b);
      if (ao !== bo) return bo - ao;
      const as = new Date(a.start), bs = new Date(b.start);
      return as - bs;
    });
    scroll.innerHTML = sorted.map((f,i) => {
      const p = pastel[f.cat] || pastel["기타"];
      const ongoing = isOngoing(f);
      const s = new Date(f.start); s.setHours(0,0,0,0);
      const e = new Date(f.end);   e.setHours(0,0,0,0);
      const diffStart = Math.round((s - now) / 86400000);
      const diffEnd   = Math.round((e - now) / 86400000);

      let badge = '';
      if (ongoing) {
        const remain = diffEnd === 0 ? '오늘 마지막' : `${diffEnd}일 남음`;
        badge = `<span class="card-ongoing">● ${remain}</span>`;
      } else if (diffStart > 0) {
        const cls = diffStart <= 7 ? 'mid' : 'low';
        badge = `<span class="card-dday ${cls}">D-${diffStart}</span>`;
      }

      return `<div class="card" data-idx="${i}" data-lat="${f.lat}" data-lng="${f.lng}">
        <div class="card-dot" style="background:${p.main}"></div>
        <div class="card-body">
          <div class="card-name">${f.name}</div>
          <div class="card-sub">${f.period} · ${f.region}</div>
        </div>
        ${badge}
      </div>`;
    }).join('');
    scroll.querySelectorAll('.card').forEach((el, i) => {
      const f = sorted[i];
      el.addEventListener('click', () => {
        map.flyTo([f.lat, f.lng], 13, {duration: 0.8});
        document.getElementById('list-panel').classList.remove('open');
        setTimeout(() => {
          const mk = markers.find(m => m.getLatLng().lat === f.lat && m.getLatLng().lng === f.lng);
          if (mk) { closeAll(); mk.openPopup(); }
        }, 900);
      });
    });
  }

  function render(filter) {
    markers.forEach(m => map.removeLayer(m));
    markers = []; ongoingMarkers = [];

    const data = filter === "전체" ? festivals : festivals.filter(f => f.cat === filter);
    const ongoingList = data.filter(f => isOngoing(f));

    document.getElementById('cnt-badge').textContent = `전국 ${data.length}개 축제`;

    // 일반 마커
    data.filter(f => !isOngoing(f)).forEach(f => {
      const m = L.marker([f.lat, f.lng], {icon: makeIcon(f.cat, false)})
        .bindPopup(makePopup(f, false), {maxWidth:240, closeButton:true})
        .addTo(map);
      m.on('click', () => { closeAll(); setTimeout(() => m.openPopup(), 10); });
      markers.push(m);
    });

    // 진행중 마커
    ongoingList.forEach((f, idx) => {
      const m = L.marker([f.lat, f.lng], {icon: makeIcon(f.cat, true), zIndexOffset: 1000})
        .bindPopup(makePopup(f, true), {maxWidth:240, closeButton:true, autoClose:false, closeOnClick:false})
        .addTo(map);
      m.on('click', () => { closeAll(); setTimeout(() => m.openPopup(), 10); });
      if (idx === 0) setTimeout(() => m.openPopup(), 600);
      markers.push(m);
      ongoingMarkers.push(m);
    });

    renderCards(data);
  }

  renderTicker();

  document.getElementById('list-btn').addEventListener('click', () => {
    document.getElementById('list-panel').classList.toggle('open');
  });
  document.getElementById('list-close').addEventListener('click', () => {
    document.getElementById('list-panel').classList.remove('open');
  });
  map.on('click', () => {
    document.getElementById('list-panel').classList.remove('open');
  });

  // 최초 렌더
  render("전체");

  // 진행중 배지 — 전체 기준 진행중 개수 항상 표시
  const allOngoing = festivals.filter(f => isOngoing(f));
  const ongoingBarEl = document.getElementById('ongoing-bar');
  document.getElementById('ongoing-cnt').textContent = allOngoing.length;
  ongoingBarEl.style.display = allOngoing.length > 0 ? 'block' : 'none';

  // 진행중 배지 클릭 토글
  let ongoingMode = false;
  ongoingBarEl.addEventListener('click', () => {
    ongoingMode = !ongoingMode;

    if (ongoingMode) {
      // 활성: 초록 스타일
      ongoingBarEl.style.background = '#2ECC71';
      ongoingBarEl.style.color = 'white';
      ongoingBarEl.style.borderColor = '#1aab5a';

      // 모든 마커 지우고 진행중만 새로 그리기
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      ongoingMarkers = [];

      allOngoing.forEach(f => {
        const m = L.marker([f.lat, f.lng], {icon: makeIcon(f.cat, true), zIndexOffset: 1000})
          .bindPopup(makePopup(f, true), {maxWidth:240, closeButton:true, autoClose:false, closeOnClick:false})
          .addTo(map);
        m.on('click', () => { closeAll(); setTimeout(() => m.openPopup(), 10); });
        markers.push(m);
        ongoingMarkers.push(m);
      });

      document.getElementById('cnt-badge').textContent = `진행중 ${allOngoing.length}개`;
      renderCards(allOngoing);

    } else {
      // 비활성: 원래 스타일 복원
      ongoingBarEl.style.background = '';
      ongoingBarEl.style.color = '';
      ongoingBarEl.style.borderColor = '';

      // 현재 선택된 필터로 복원
      const activeBtn = document.querySelector('.f-btn.active');
      render(activeBtn ? activeBtn.dataset.cat : '전체');
    }
  });

  // 하단 필터 클릭 시 진행중 모드 해제
  document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.f-btn');
    if (!btn) return;
    ongoingMode = false;
    ongoingBarEl.style.background = '';
    ongoingBarEl.style.color = '';
    ongoingBarEl.style.borderColor = '';
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.cat);
  });

  // 진짜 방문자 카운터 — Upstash Redis API
  fetch('/api/visitors')
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById('visitor-cnt');
      if (!el || !d.count) return;
      const target = d.count;
      const from = Math.max(target - 80, 0);
      const duration = 1200;
      const t0 = performance.now();
      function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
      function tick(ts) {
        const p = Math.min((ts - t0) / duration, 1);
        el.textContent = Math.floor(from + (target - from) * easeOut(p)).toLocaleString();
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })
    .catch(() => {
      const el = document.getElementById('visitor-cnt');
      if (el) el.textContent = '🌸';
    });

  </script>

  <!-- 문의 모달 -->
  <div id="mail-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;" onclick="if(event.target===this)this.style.display='none'">
    <div style="background:white;border-radius:20px;padding:28px 24px;width:88%;max-width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <div style="font-size:28px;margin-bottom:10px;">✉️</div>
      <div style="font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:6px;">문의하기</div>
      <div style="font-size:12px;color:#888;margin-bottom:18px;">봄꽃 축제 정보 추가 및 오류 제보 환영해요!</div>
      <div id="mail-addr" style="background:#FFF5F5;border:1px solid #FFD0D0;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;color:#D94F4F;margin-bottom:14px;cursor:pointer;user-select:all;" onclick="
        navigator.clipboard.writeText('moon-in@kakao.com');
        this.textContent='✅ 복사됐어요!';
        setTimeout(()=>this.textContent='moon-in@kakao.com',2000);
      ">moon-in@kakao.com</div>
      <a href="mailto:moon-in@kakao.com" style="display:block;padding:10px;background:#FF6B6B;color:white;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;margin-bottom:8px;">메일 앱으로 열기</a>
      <button onclick="document.getElementById('mail-modal').style.display='none'" style="width:100%;padding:9px;background:none;border:1px solid #eee;border-radius:10px;font-size:13px;color:#888;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">닫기</button>
    </div>
  </div>

</body>
